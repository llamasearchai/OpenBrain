version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "127.0.0.1:8000:8000"
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - api
