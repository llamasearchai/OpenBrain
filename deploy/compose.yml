services:
  app:
    image: openbrain/app:local
    build:
      context: ..
      dockerfile: deploy/app.Dockerfile
    environment:
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://127.0.0.1:4000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local-dev-key}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - litellm
    networks: [obnet]

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    ports:
      - "127.0.0.1:5173:80"
    depends_on: [app]
    networks: [obnet]

  litellm:
    image: openbrain/litellm:local
    build:
      context: .
      dockerfile: litellm.Dockerfile
    environment:
      - LITELLM_PORT=4000
    ports:
      - "127.0.0.1:4000:4000"
    networks: [obnet]

  qdrant:
    image: qdrant/qdrant:latest
    profiles: [vector]
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ../data/qdrant:/qdrant/storage:z
    networks: [obnet]

  ollama:
    image: ollama/ollama:latest
    profiles: [ollama]
    environment:
      - OLLAMA_HOST=0.0.0.0
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ../data/ollama:/root/.ollama:z
    networks: [obnet]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    command: ["--config", "/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    profiles: [observability]
    networks: [obnet]

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    profiles: [observability]
    networks: [obnet]

  loki:
    image: grafana/loki:2.9.8
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
      - ../data/loki:/loki:z
    ports:
      - "127.0.0.1:3100:3100"
    profiles: [observability]
    networks: [obnet]

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    profiles: [observability]
    networks: [obnet]

networks:
  obnet:
    driver: bridge
